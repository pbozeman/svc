# SVC RISC-V riscv-dv test list
#
# This file defines the tests to run for the SVC RV32IM processor.

- test: riscv_arithmetic_basic_test
  description: >
    Arithmetic instruction test, no load/store/branch instructions
  gen_opts: >
    +instr_cnt=1000
    +num_of_sub_program=0
    +no_fence=1
    +no_data_page=1
    +no_branch_jump=1
    +boot_mode=m
    +no_csr_instr=1
    +disable_compressed_instr=1
  iterations: 1
  gen_test: riscv_instr_base_test
  rtl_test: core_base_test

- test: riscv_rand_instr_test
  description: >
    Random instruction stress test
  iterations: 1
  gen_test: riscv_instr_base_test
  gen_opts: >
    +instr_cnt=1000
    +num_of_sub_program=0
    +no_csr_instr=1
    +disable_compressed_instr=1
  rtl_test: core_base_test

- test: riscv_jump_stress_test
  description: >
    Stress back-to-back jump instruction test
  iterations: 1
  gen_test: riscv_instr_base_test
  gen_opts: >
    +instr_cnt=500
    +num_of_sub_program=0
    +directed_instr_0=riscv_jal_instr,20
    +no_csr_instr=1
    +disable_compressed_instr=1
  rtl_test: core_base_test

- test: riscv_load_store_test
  description: >
    Load/store stress test
  iterations: 1
  gen_test: riscv_instr_base_test
  gen_opts: >
    +instr_cnt=1000
    +num_of_sub_program=0
    +no_csr_instr=1
    +disable_compressed_instr=1
  rtl_test: core_base_test

- test: riscv_loop_test
  description: >
    Loop test with branch instructions
  iterations: 1
  gen_test: riscv_instr_base_test
  gen_opts: >
    +instr_cnt=1000
    +num_of_sub_program=0
    +no_csr_instr=1
    +disable_compressed_instr=1
  rtl_test: core_base_test

